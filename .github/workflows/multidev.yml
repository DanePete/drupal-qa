name: Multidev Environment

on:
  workflow_call:
    inputs:
      php_version:
        type: string
        default: '8.3'
      pantheon_site:
        type: string
        required: true
        description: 'Pantheon site machine name'
      pantheon_site_id:
        type: string
        required: true
        description: 'Pantheon site UUID'
      run_behat:
        type: boolean
        default: true
        description: 'Run Behat smoke tests against the multidev'
      behat_tags:
        type: string
        default: 'smoke'
        description: 'Behat tag filter expression'
      source_env:
        type: string
        default: 'live'
        description: 'Pantheon environment to clone the multidev from'
    secrets:
      PANTHEON_SSH_KEY:
        required: true
      PANTHEON_MACHINE_TOKEN:
        required: true

concurrency:
  group: multidev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MULTIDEV_NAME: pr-${{ github.event.pull_request.number }}

jobs:
  create-multidev:
    name: Deploy to Multidev
    runs-on: ubuntu-latest
    outputs:
      multidev_url: ${{ steps.env-url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2

      - name: Install Terminus
        run: |
          mkdir -p ~/terminus && cd ~/terminus
          curl -L "https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar" -o terminus
          chmod +x terminus
          echo "$HOME/terminus" >> $GITHUB_PATH

      - name: Authenticate Terminus
        run: terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PANTHEON_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 codeserver.dev.${{ inputs.pantheon_site_id }}.drush.in >> ~/.ssh/known_hosts 2>/dev/null

      - name: Delete and recreate multidev if it exists
        run: |
          if terminus multidev:list "${{ inputs.pantheon_site }}" --format=list --field=id 2>/dev/null | grep -q "^${{ env.MULTIDEV_NAME }}$"; then
            echo "Deleting existing multidev ${{ env.MULTIDEV_NAME }}..."
            terminus multidev:delete "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" --delete-branch --yes || true
            terminus workflow:wait "${{ inputs.pantheon_site }}" --max=300 || true
          fi
          echo "Creating multidev ${{ env.MULTIDEV_NAME }} from ${{ inputs.source_env }}..."
          terminus multidev:create "${{ inputs.pantheon_site }}.${{ inputs.source_env }}" "${{ env.MULTIDEV_NAME }}"
          terminus workflow:wait "${{ inputs.pantheon_site }}" --max=300

      - name: Push code to multidev
        run: |
          git remote add pantheon ssh://codeserver.dev.${{ inputs.pantheon_site_id }}@codeserver.dev.${{ inputs.pantheon_site_id }}.drush.in:2222/~/repository.git
          git push pantheon HEAD:refs/heads/${{ env.MULTIDEV_NAME }} --force

      - name: Wait for code sync and run post-deploy commands
        run: |
          echo "Waiting for Pantheon to finish code sync..."
          terminus workflow:wait "${{ inputs.pantheon_site }}" --max=300
          terminus env:wake "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" || true
          terminus drush "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" -- updatedb -y || true
          terminus drush "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" -- config:import -y || true
          terminus drush "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" -- cache:rebuild || true

      - name: Validate config sync
        run: |
          echo "Checking for unexported config changes..."
          CONFIG_STATUS=$(terminus drush "${{ inputs.pantheon_site }}.${{ env.MULTIDEV_NAME }}" -- config:status --format=list 2>/dev/null || true)
          if [ -n "$CONFIG_STATUS" ] && [ "$CONFIG_STATUS" != "No differences between DB and sync directory." ]; then
            echo "::warning::Config out of sync after deploy — some config may not be exported:"
            echo "$CONFIG_STATUS"
          else
            echo "Config is in sync."
          fi

      - name: Get environment URL
        id: env-url
        run: |
          URL="https://${{ env.MULTIDEV_NAME }}-${{ inputs.pantheon_site }}.pantheonsite.io"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Multidev URL: $URL"

      - name: Comment PR with environment URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.env-url.outputs.url }}';
            const body = `### Pantheon Multidev Environment\n\n` +
              `| | |\n|---|---|\n` +
              `| **URL** | ${url} |\n` +
              `| **Environment** | \`${{ env.MULTIDEV_NAME }}\` |\n` +
              `| **Status** | Deployed |\n\n` +
              `This environment will be automatically deleted when the PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Pantheon Multidev Environment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  behat:
    name: Behat Tests
    runs-on: ubuntu-latest
    needs: create-multidev
    if: ${{ inputs.run_behat }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          extensions: mbstring, xml, curl, gd, zip
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Behat smoke tests against multidev
        run: |
          BEHAT_BASE_URL="${{ needs.create-multidev.outputs.multidev_url }}" \
            ./vendor/bin/behat --tags=${{ inputs.behat_tags }} --format=progress --no-interaction
        continue-on-error: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots
          path: /tmp/behat-screenshots/
          retention-days: 7
          if-no-files-found: ignore
